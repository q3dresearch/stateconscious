[pytest]
pythonpath = . src
testpaths = tests
markers =
    live_parliament: hits parlimen.gov.my (requires PARLIAMENT_LIVE_CSV_TEST=1 for CSV+PDF test)
# -v: print each test name; -s: do not capture stdout/stderr (see prints & library logs);
# --tb=short: compact tracebacks on failure.
# Exclude live_parliament by default so a .env with PARLIAMENT_LIVE_CSV_TEST=1 does not slow full runs.
# Run live test explicitly: pytest tests/test_parliament_live_year_csv_pdf.py -m live_parliament
addopts = -v -s --tb=short -m "not live_parliament"

site_name: StateConscious
site_description: A diff engine for public policy — tracking how laws change and who they affect.
docs_dir: docs

nav:
  - Introduction: index.md
  - Sources:
    - Overview: sources/index.md
    - Country / State / Category: sources/taxonomy.md
    - Malaysia — Parliament: sources/my/parliament.md
  - Pipeline:
    - Overview: pipeline/index.md
    - Download: pipeline/download.md
    - Extract: pipeline/extract.md
    - Analyze: pipeline/analyze.md
  - Storage:
    - Overview: storage/index.md
    - Schema: storage/schema.md
    - Vector Store: storage/vector.md
  - Who uses it:
    - Overview: usage/index.md
    - Litigator: usage/litigator.md
    - Consumer: usage/consumer.md
    - Business owner: usage/business.md
    - Judge: usage/judge.md
    - Politician: usage/politician.md
    - Journalist: usage/journalist.md
  - Reference:
    - Architecture: ARCHITECTURE.md
    - Operations: OPERATIONS.md
    - Project Use: PROJECT_USE.md

theme:
  name: material
  palette:
    primary: deep purple
    accent: purple
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate
  font:
    text: Inter

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
